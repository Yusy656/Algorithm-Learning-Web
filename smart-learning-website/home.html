            <!-- 智能知识解答功能卡片 -->
            <div class="feature-card">
                <div class="feature-icon">
                    <i class="fa fa-comments"></i>
                </div>
                <h2 class="feature-title">智能知识解答</h2>
                <p class="feature-description">
                    遇到不懂的问题？上传图片或输入文字，智能系统将为您提供详细解答和知识点解析。
                </p>
                <a href="knowledge-answer.html" class="btn">开始提问</a>
            </div>
        </div>

    <!-- API文件 -->
    <script src="api.js"></script>
    
    <!-- 页面脚本 -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 获取DOM元素
            const userName = document.getElementById('user-name');
            const logoutBtn = document.getElementById('logout-btn');
            
            // 检查用户是否已登录
            if (!api.user.isLoggedIn()) {
                // 如果未登录，跳转到登录页面
                // window.location.href = 'login.html';
                return;
            }
            
            // 获取当前用户信息并显示
            const currentUser = api.user.getCurrentUser();
            if (currentUser && currentUser.studentId) {
                userName.textContent = `欢迎，${currentUser.studentId}`;
            }
            
            // 退出登录按钮点击事件
            logoutBtn.addEventListener('click', function() {
                // 调用退出登录API
                api.user.logout();
                
                // 跳转到登录页面
                window.location.href = 'login.html';
            });
        });
    </script>
