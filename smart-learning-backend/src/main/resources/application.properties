# 应用配置
spring.application.name=smart-learning-backend
server.port=8080

# 数据库配置 - 使用H2内存数据库
spring.datasource.url=jdbc:h2:mem:smart_learning;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2控制台配置
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA配置
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# 日志配置
logging.level.root=INFO
logging.level.com.smartlearning=DEBUG

# JWT配置
jwt.secret=your-secret-key-change-in-production
jwt.expiration=3600000

# Python服务配置
python.service.url=http://localhost:8080